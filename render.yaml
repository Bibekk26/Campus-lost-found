services:
  - type: web
    name: campus-lost-found
    env: docker
    plan: free
    disk:
      name: uploads
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: postgres
      - key: DATABASE_DRIVER
        value: org.postgresql.Driver
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: DATABASE_URL
        fromDatabase:
          name: campus-lost-found-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: campus-lost-found-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: campus-lost-found-db
          property: password

databases:
  - name: campus-lost-found-db
    plan: free
