<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} + ' | Campus Lost & Found'">Campus Lost & Found</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <script defer th:src="@{/js/app.js}"></script>
</head>
<body>
<header th:fragment="nav">
    <nav class="navbar">
        <a class="brand" th:href="@{/items}">
            <span class="brand-mark">CL</span>
            <span>Campus Lost & Found</span>
        </a>
        <div class="nav-links">
            <a th:href="@{/items}">Browse</a>
            <a sec:authorize="isAuthenticated()" th:href="@{/items/new}">Post Item</a>
            <a sec:authorize="!isAuthenticated()" th:href="@{/login}">Login</a>
            <a sec:authorize="!isAuthenticated()" th:href="@{/register}">Sign Up</a>
            <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="inline-form">
                <button class="link-button" type="submit">Logout</button>
            </form>
        </div>
    </nav>
</header>
</body>
</html>
