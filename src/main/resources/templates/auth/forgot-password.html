<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Forgot Password')}"></head>
<body>
<header th:replace="~{layout :: nav}"></header>
<main class="container auth-page">
    <div class="page-heading">
        <p class="eyebrow">Account help</p>
        <h1>Reset Password</h1>
    </div>
    <form class="form-panel reveal" th:action="@{/forgot-password}" th:object="${resetForm}" method="post">
        <label>Email
            <input th:field="*{email}" type="email" required autocomplete="email">
            <span class="error" th:errors="*{email}"></span>
        </label>
        <label>New Password
            <input th:field="*{password}" type="password" required minlength="6" autocomplete="new-password">
            <span class="error" th:errors="*{password}"></span>
        </label>
        <label>Confirm Password
            <input th:field="*{confirmPassword}" type="password" required minlength="6" autocomplete="new-password">
            <span class="error" th:errors="*{confirmPassword}"></span>
        </label>
        <button class="primary-button" type="submit">Change Password</button>
    </form>
    <p class="helper-text">Remembered it? <a th:href="@{/login}">Back to login</a></p>
</main>
</body>
</html>
